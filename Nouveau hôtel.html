<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Hôtel</title>
    <link rel="stylesheet" href="Nouveau hôtel.css">
</head>
<body>
<body>
  <div class="modal">
    <div class="modal-header">
      <a href="liste des hotels.html"><span class="back-arrow">←</span></a>
      <span>CRÉER UN NOUVEAU HÔTEL</span>
    </div>

    <form id="hotelForm">
      <div class="form-grid">
        <div class="form">
          <label>Nom de l'hôtel</label>
          <input type="text" id="nom" placeholder="CAP Marniane">
        </div>

        <div class="form">
          <label>Adresse</label>
          <input type="text" id="adresse" value="Les îles du saloum, Mar Lodj">
        </div>

        <div class="form">
          <label>E-mail</label>
          <input type="email" id="email" value="information@gmail.com">
        </div>

        <div class="form">
          <label>Numéro de téléphone</label>
          <input type="tel" id="phone" value="+221 77 777 77 77">
        </div>

        <div class="form">
          <label>Prix par nuit</label>
          <input type="text" id="prix" value="25.000 XOF">
        </div>

        <div class="form">
          <label>Devise</label>
          <select id="devise">
            <option>F XOF</option>
            <option>EUR</option>
            <option>USD</option>
          </select>
        </div>

        <div class="form upload-area">
          <label>Ajouter une photo</label>
          <div class="upload-box" id="uploadBox">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <span>Ajouter une photo</span>
            <input type="file" id="photo" hidden>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="submit" class="btn"><strong><a href="liste des hotels.html">Enregistrer</a></strong></button>
      </div>
    </form>
  </div>
</body>
</html>

    </main>
</body>
</html>
