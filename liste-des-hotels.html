<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listes de Hôtels</title>
    <link rel="stylesheet" href="liste des hotels.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburger">
            <i class="fa-solid fa-bars"></i>
        </label>
      <div class="container">
    <aside class="sidebar">
        <h2><i class="fa-solid fa-bookmark"></i> RED PRODUCT</h2>

        <p class="section">Principal</p>

        <a href="index.html" > <i class="fa-solid fa-chart-column"></i> Dashboard</a>
        <a href="liste-des-hotels.html" class="active"> <i class="fa-solid fa-hotel"></i> Liste des hôtels</a>
        <button  class="btn-sidebar" onclick="togglePopup()"><i class="fa-solid fa-plus"></i> Créer un hôtel </button>
        <div class="sidebar-user">
            
            <div class="user">
                <img src="image/homme.jpg">
                <span class="status"></span>
            </div>
            <div>
                <p>Mouhamet Badiane</p>
                <small>en ligne</small>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="top-fixed">
    <div class="navbar">
        <h3>Liste des hôtels</h3>
        <div class="nav-right">
            <input type="search" placeholder="Recherche">

            <div class="bell">
                <i class="fa-regular fa-bell"></i>
                <span class="badge">3</span>
            </div>

            <div class="user">
                <a href="profil.html"><img src="image/homme.jpg"></a>
                <span class="status"></span>
            </div>

            <div class="conec">
                <a href="connexion.html">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="header">
        <h2>Hôtels 8</h2>
        <button onclick="togglePopup()"><i class="fa-solid fa-plus"></i>Créer un nouveau hôtel</button>
    </div>
    </div>


        <div class="cards">
          
        </div>

        

        <div id="modal">
    <div class="modal-header">
      <a href=""><span class="back-arrow">←</span></a>
      <span>CRÉER UN NOUVEAU HÔTEL</span>
    </div>

    <form id="hotelForm" onsubmit="creerHotel(event)">
      <div class="form-grid">
        <div class="form">
          <label>Nom de l'hôtel</label>
          <input type="text" id="nom" placeholder="CAP Marniane">
        </div>

        <div class="form">
          <label>Adresse</label>
          <input type="text" id="adresse" value="Les îles du saloum, Mar Lodj">
        </div>

        <div class="form">
          <label>E-mail</label>
          <input type="email" id="email" value="information@gmail.com">
        </div>

        <div class="form">
          <label>Numéro de téléphone</label>
          <input type="tel" id="phone" value="+221 77 777 77 77">
        </div>

        <div class="form">
          <label>Prix par nuit</label>
          <input type="text" id="prix" value="25.000 XOF">
        </div>

        <div class="form">
          <label>Devise</label>
          <select id="devise">
            <option>F XOF</option>
            <option>EUR</option>
            <option>USD</option>
          </select>
        </div>
        <div class="form upload-area">
  <label>Ajouter une photo</label>

  <label for="photo" class="upload-box" id="uploadBox">
    <svg viewBox="0 0 24 24">
      <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
    </svg>

    <span>Ajouter une photo</span>
  </label>

  <input type="file" id="photo" hidden>
</div>
      </div>

      <div class="modal-footer">
       <button type="submit" class="btn">Enregistrer</button>
      </div>
    </form>
  </div>

    </main>
</div>
    

  <script>
    function togglePopup() {
    const popup = document.querySelector("#modal");
    if (popup) popup.classList.toggle("open");
}


window.togglePopup = togglePopup;

  </script>

    <script src="liste-hôtel.js" type="module"></script>
</body>
</html>
